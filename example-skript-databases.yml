# Paste this block into Skript's config.yml under "databases:" to activate SkStorage.
# Replace whatever you have under "default:" and any existing SQLibrary typed databases.
#
# Routing happens by first match wins in the order listed below.
#   1. persistent. Variables matching SkStorage's persistent allowlist (config.yml).
#   2. player. Anything else containing a UUID. Lazy, per player file.
#   3. server. Fallback catch all for non UUID variables.
#
# Skript itself also requires a `pattern:` field on each. Set it to ".*" to allow
# everything. SkStorage's accept() ignores Skript's pattern and uses its own logic.

databases:
    persistent:
        type: skstorage-persistent
        pattern: .*
        file: ./plugins/SkStorage/persistent.db
        backup interval: 6 hours
        backups to keep: 8
        monitor changes: false
        monitor interval: 20 seconds

    player:
        type: skstorage-player
        pattern: .*
        # Per player files live under this directory, sharded by first 2 hex chars of UUID.
        directory: ./plugins/SkStorage/player
        backup interval: 0
        backups to keep: -1
        monitor changes: false
        monitor interval: 20 seconds

    server:
        type: skstorage-server
        pattern: .*
        file: ./plugins/SkStorage/server.db
        backup interval: 6 hours
        backups to keep: 8
        monitor changes: false
        monitor interval: 20 seconds
