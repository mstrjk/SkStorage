name: SkStorage
version: 1.2.0
main: dev.teacommontea.skstorage.SkStoragePlugin
api-version: '1.21'
authors: [TeaCommonTea]
description: Modern SQLite-backed Skript variable storage with auto-routing, per-player files, season management, and built-in player metadata tracking.
depend: [Skript]
softdepend: [PlotSquared]
libraries:
  - org.xerial:sqlite-jdbc:3.46.1.3

commands:
  skstorage:
    description: SkStorage admin commands.
    aliases: [skst]
    permission: skstorage.admin
    usage: /skstorage <reset-season|migrate|who|stats>

permissions:
  skstorage.admin:
    description: Allows use of /skstorage admin commands.
    default: op
